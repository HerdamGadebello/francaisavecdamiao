        document.addEventListener('DOMContentLoaded', () => {
            const loginScreen = document.getElementById('login-screen');
            const conteudo = document.getElementById('conteudo');
            const loginAluno = document.getElementById('login-aluno');
            const entrarProfessor = document.getElementById('entrar-professor');
            const senhaProfessor = document.getElementById('senha-professor');
            const erroLogin = document.getElementById('erro-login');
            const adicionarModulo = document.getElementById('adicionar-modulo');
            const formModulo = document.getElementById('form-modulo');
            const listaModulos = document.getElementById('lista-modulos');
            let modulos = JSON.parse(localStorage.getItem('modulos')) || [];
            const SENHA_PROFESSOR = 'Aletei4f!los'; // Senha alterada

            // Função para renderizar módulos
            function renderizarModulos(isProfessor) {
                listaModulos.innerHTML = '';
                modulos.forEach((modulo, index) => {
                    const divModulo = document.createElement('div');
                    divModulo.classList.add('modulo');
                    divModulo.innerHTML = `
                        <h3>${modulo.titulo}</h3>
                        <p>${modulo.descricao}</p>
                        <div class="exercicios">${marked.parse(modulo.exercicios)}</div>
                        ${isProfessor ? `<button onclick="removerModulo(${index})">Remover</button>` : ''}
                    `;
                    listaModulos.appendChild(divModulo);
                });
            }

            // Login como Aluno
            loginAluno.addEventListener('click', () => {
                loginScreen.style.display = 'none';
                conteudo.style.display = 'block';
                renderizarModulos(false);
            });

            // Login como Professor
            entrarProfessor.addEventListener('click', () => {
                if (senhaProfessor.value === SENHA_PROFESSOR) {
                    loginScreen.style.display = 'none';
                    conteudo.style.display = 'block';
                    adicionarModulo.style.display = 'block';
                    renderizarModulos(true);
                } else {
                    erroLogin.textContent = 'Senha incorreta!';
                }
            });

            // Função para adicionar módulo
            formModulo.addEventListener('submit', (e) => {
                e.preventDefault();
                const novoModulo = {
                    titulo: document.getElementById('titulo').value,
                    descricao: document.getElementById('descricao').value,
                    exercicios: document.getElementById('exercicios').value
                };
                modulos.push(novoModulo);
                localStorage.setItem('modulos', JSON.stringify(modulos));
                renderizarModulos(true);
                formModulo.reset();
            });

            // Função para remover módulo
            window.removerModulo = (index) => {
                modulos.splice(index, 1);
                localStorage.setItem('modulos', JSON.stringify(modulos));
                renderizarModulos(true);
            };

            // Carregar Marked.js para renderizar Markdown
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
            document.head.appendChild(script);
        });
    </script>
